name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features
      - name: Test
        run: cargo test --all-features

  msrv:
    name: msrv (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --all-features

  deno:
    name: deno (reference host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Format
        run: deno fmt --check
      - name: Lint
        run: deno lint
      - name: Type check
        run: deno check examples/passthrough.ts examples/msgpack_render.ts

  nix:
    name: nix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      # Push freshly built outputs to the binary cache. The token is absent on
      # fork pull requests, so only push on repo pushes — PRs still pull from
      # the cache via the flake's nixConfig substituter.
      - uses: cachix/cachix-action@v16
        if: github.event_name != 'pull_request'
        with:
          name: ptybridge
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Flake check
        run: nix flake check --print-build-logs
      - name: Build
        run: nix build --print-build-logs
      - name: Smoke test
        run: nix run . -- --version
